services:
  db:
    image: pgvector/pgvector:0.8.2-pg16-bookworm
    environment:
      POSTGRES_DB: idea_bounty
      POSTGRES_USER: idea_bounty
      POSTGRES_PASSWORD: idea_bounty_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idea_bounty -d idea_bounty"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:
